<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<body>

<header th:fragment="header(usuario)" class="painel-header">
    <h1 th:text="'Bem-vindo, ' + ${usuario.nome} + '!'">Bem-vindo!</h1>

    <div class="header-controls">

        <!-- Toggle de tema -->
        <div class="theme-switch-wrapper">
            <label class="theme-switch" for="checkbox-theme">
                <input type="checkbox" id="checkbox-theme"/>
                <div class="slider round">
                    <span class="icon-sun">☀️</span>
                    <span class="icon-moon">🌙</span>
                </div>
            </label>
        </div>

        <!-- Botão home -->
        <a th:href="@{/}" class="btn-home" title="Voltar ao Início">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
        </a>

        <!-- Ícone de usuário com dropdown -->
        <div class="user-icon-painel">
            <img th:if="${usuario.foto != null}"
                 th:src="@{'/uploads/' + ${usuario.foto}}"
                 alt="Perfil" class="user-avatar"/>
            <span th:unless="${usuario.foto != null}">👤</span>

            <div class="dropdown-menu">
                <a th:href="@{/chat}">💬 Chat</a>
                <a th:href="@{/configuracoes}">Configurações</a>
                <a href="#"
                   onclick="event.preventDefault(); document.getElementById('form-logout-header').submit();"
                   class="btn-sair">Sair</a>
            </div>
        </div>

        <!-- Form logout oculto -->
        <form id="form-logout-header" th:action="@{/logout}" method="POST" style="display:none">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        </form>

    </div>
</header>

</body>
</html>
