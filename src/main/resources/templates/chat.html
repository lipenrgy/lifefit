<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat — Life Fit</title>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <link rel="stylesheet" th:href="@{/painel.css}">
    <script>
        (function() {
            const t = localStorage.getItem('theme');
            if (t === 'dark') document.documentElement.classList.add('dark-mode');
            else if (window.matchMedia('(prefers-color-scheme: dark)').matches)
                document.documentElement.classList.add('dark-mode');
        })();
    </script>
</head>
<body class="chat-page">

<div th:replace="~{fragments/header :: header(${usuario})}"></div>

<div class="chat-container">

    <div class="chat-sidebar">
        <div class="sidebar-header">💬 Mensagens</div>
        <div id="lista-contatos" class="contacts-list">
            <div style="padding:20px;text-align:center;color:var(--texto-secundario);font-size:0.88rem;">
                Carregando...
            </div>
        </div>
    </div>

    <div class="chat-main">
        <div class="chat-header">
            <h3 id="nome-destinatario">Selecione um contato</h3>
        </div>

        <div class="chat-messages" id="chat-messages">
            <div class="empty-state">
                <span style="font-size:3rem;">💬</span>
                <p>Escolha um contato para começar</p>
            </div>
        </div>

        <form class="chat-input-area" id="form-mensagem" style="display:none;">
            <input type="hidden" id="id-destinatario-atual">
            <input type="text" id="input-mensagem" placeholder="Digite sua mensagem..." autocomplete="off">
            <button type="submit" class="btn-enviar">➤</button>
        </form>
    </div>

</div>

<script th:src="@{/chat.js}"></script>
<script th:src="@{/theme-toggle.js}"></script>
</body>
</html>
