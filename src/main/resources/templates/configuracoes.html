<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Conta - Life Fit</title>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <link rel="stylesheet" th:href="@{/painel.css}">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .config-container {
            max-width: 600px;
            margin: 40px auto;
            background-color: var(--fundo-secundario);
            padding: 30px;
            border-radius: 10px;
            box-shadow: var(--sombra);
        }
        .config-header {
            border-bottom: 1px solid var(--borda);
            margin-bottom: 20px;
            padding-bottom: 10px;
        }
        .config-header h2 { color: var(--violeta); margin: 0; }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--texto-secundario);
        }
        .input-wrapper { position: relative; width: 100%; }
        .form-group input[type="text"],
        .form-group input[type="password"] {
            width: 100%;
            padding: 12px;
            padding-right: 45px;
            border: 1px solid var(--borda);
            border-radius: 5px;
            background-color: var(--fundo-primario);
            color: var(--texto-primario);
            font-size: 1rem;
            box-sizing: border-box;
        }
        .toggle-eye {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 1.2rem;
            user-select: none;
            filter: grayscale(100%);
            opacity: 0.6;
            transition: opacity 0.3s;
        }
        .toggle-eye:hover { opacity: 1; }
        .btn-salvar {
            background-color: var(--violeta);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            width: 100%;
            transition: background 0.3s;
        }
        .btn-salvar:hover { background-color: #6a1b9a; }

        /* Foto de perfil */
        .foto-perfil-area {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 10px;
        }
        .foto-perfil-area img,
        .foto-perfil-area .avatar-placeholder {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--violeta);
            background-color: var(--fundo-primario);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            flex-shrink: 0;
        }
        .foto-upload-label {
            display: inline-block;
            padding: 9px 18px;
            background-color: var(--violeta);
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: background 0.3s;
        }
        .foto-upload-label:hover { background-color: #6a1b9a; }
        .foto-nome-arquivo {
            font-size: 0.85rem;
            color: var(--texto-secundario);
            margin-top: 6px;
        }
        .btn-atualizar-foto {
            background-color: var(--fundo-primario);
            color: var(--violeta);
            border: 2px solid var(--violeta);
            padding: 9px 18px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-atualizar-foto:hover {
            background-color: var(--violeta);
            color: white;
        }
    </style>
    <script>
        (function() {
            const theme = localStorage.getItem('theme');
            if (theme === 'dark') document.documentElement.classList.add('dark-mode');
            else if (window.matchMedia('(prefers-color-scheme: dark)').matches)
                document.documentElement.classList.add('dark-mode');
        })();
    </script>
</head>
<body>

<div th:replace="~{fragments/header :: header(${usuario})}"></div>

<main>
    <div class="config-container">

        <!-- SEÇÃO FOTO -->
        <div class="config-header">
            <h2>Foto de Perfil</h2>
            <p style="font-size: 0.9em; color: #666;">Clique para atualizar sua foto</p>
        </div>

        <form th:action="@{/api/upload-foto}" method="POST" enctype="multipart/form-data" id="form-foto">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="foto-perfil-area">
                <img th:if="${usuario.foto != null}"
                     th:src="@{'/uploads/' + ${usuario.foto}}"
                     alt="Foto de perfil" id="preview-foto"/>
                <div th:unless="${usuario.foto != null}" class="avatar-placeholder">👤</div>
                <div>
                    <label for="foto_perfil" class="foto-upload-label">📷 Escolher Foto</label>
                    <input type="file" id="foto_perfil" name="foto_perfil"
                           accept="image/png, image/jpeg" style="display:none"
                           onchange="previewFoto(this)">
                    <p class="foto-nome-arquivo" id="nome-arquivo">Nenhum arquivo selecionado</p>
                    <button type="submit" class="btn-atualizar-foto">Atualizar Foto</button>
                </div>
            </div>
        </form>

        <hr style="border: 0; border-top: 1px solid var(--borda); margin: 30px 0;">

        <!-- SEÇÃO DADOS -->
        <div class="config-header">
            <h2>Meus Dados</h2>
            <p style="font-size: 0.9em; color: #666;">Atualize suas informações pessoais</p>
        </div>

        <form id="form-config">
            <div class="form-group">
                <label for="nome">Seu Nome Completo</label>
                <input type="text" id="nome" name="nome" th:value="${usuario.nome}" required>
            </div>

            <hr style="border: 0; border-top: 1px solid var(--borda); margin: 30px 0;">

            <div class="config-header">
                <h2>Segurança</h2>
                <p style="font-size: 0.9em; color: #666;">Preencha apenas se quiser trocar a senha</p>
            </div>

            <div class="form-group">
                <label for="nova_senha">Nova Senha</label>
                <div class="input-wrapper">
                    <input type="password" id="nova_senha" name="nova_senha" placeholder="Digite a nova senha">
                    <span class="toggle-eye" onclick="toggleSenha('nova_senha', this)">👁️</span>
                </div>
            </div>

            <div class="form-group">
                <label for="confirmar_senha">Confirmar Nova Senha</label>
                <div class="input-wrapper">
                    <input type="password" id="confirmar_senha" name="confirmar_senha" placeholder="Repita a nova senha">
                    <span class="toggle-eye" onclick="toggleSenha('confirmar_senha', this)">👁️</span>
                </div>
            </div>

            <button type="submit" class="btn-salvar">Salvar Alterações</button>
        </form>
    </div>
</main>

<script th:src="@{/theme-toggle.js}"></script>
<script>
    function previewFoto(input) {
        const nomeArquivo = document.getElementById('nome-arquivo');
        nomeArquivo.textContent = input.files[0] ? input.files[0].name : 'Nenhum arquivo selecionado';

        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const preview = document.getElementById('preview-foto');
                const placeholder = document.querySelector('.avatar-placeholder');
                if (preview) {
                    preview.src = e.target.result;
                } else if (placeholder) {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.id = 'preview-foto';
                    img.alt = 'Foto de perfil';
                    img.style.cssText = 'width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid var(--violeta);';
                    placeholder.replaceWith(img);
                }
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function toggleSenha(campoID, icone) {
        const input = document.getElementById(campoID);
        if (input.type === "password") {
            input.type = "text";
            icone.textContent = "🙈";
        } else {
            input.type = "password";
            icone.textContent = "👁️";
        }
    }

    document.getElementById('form-config').addEventListener('submit', function(e) {
        e.preventDefault();

        const novaSenha = document.getElementById('nova_senha').value;
        const confirmarSenha = document.getElementById('confirmar_senha').value;

        if (novaSenha !== confirmarSenha) {
            Swal.fire({ icon: 'error', title: 'Atenção', text: 'As senhas não coincidem!', confirmButtonColor: '#8A2BE2' });
            return;
        }

        const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute('content');
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');
        const params = new URLSearchParams({ nome: document.getElementById('nome').value, nova_senha: novaSenha });
        const headers = { 'Content-Type': 'application/x-www-form-urlencoded' };
        headers[csrfHeader] = csrfToken;

        fetch('/api/atualizar-perfil', { method: 'POST', headers: headers, body: params })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    Swal.fire({ icon: 'success', title: 'Atualizado!', text: data.message, confirmButtonColor: '#8A2BE2' })
                        .then(result => { if (result.isConfirmed) location.reload(); });
                } else {
                    Swal.fire({ icon: 'error', title: 'Erro', text: data.message, confirmButtonColor: '#d33' });
                }
            })
            .catch(() => {
                Swal.fire({ icon: 'error', title: 'Erro de Conexão', text: 'Não foi possível salvar os dados.', confirmButtonColor: '#d33' });
            });
    });
</script>
</body>
</html>
