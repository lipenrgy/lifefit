<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações — Life Fit</title>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <link rel="stylesheet" th:href="@{/painel.css}">
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        (function() {
            const t = localStorage.getItem('theme');
            if (t === 'dark') document.documentElement.classList.add('dark-mode');
            else if (window.matchMedia('(prefers-color-scheme: dark)').matches)
                document.documentElement.classList.add('dark-mode');
        })();
    </script>
</head>
<body>

<div th:replace="~{fragments/header :: header(${usuario})}"></div>

<main class="config-page">

    <!-- FOTO -->
    <div class="config-card">
        <div class="config-card-header">
            <div class="config-card-icon">📸</div>
            <div>
                <h2>Foto de Perfil</h2>
                <p>Atualize sua foto de perfil</p>
            </div>
        </div>
        <form th:action="@{/api/upload-foto}" method="POST" enctype="multipart/form-data">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="foto-perfil-area">
                <img th:if="${usuario.foto != null}"
                     th:src="@{'/uploads/' + ${usuario.foto}}"
                     alt="Foto" id="preview-foto"/>
                <div th:unless="${usuario.foto != null}" class="avatar-placeholder">👤</div>
                <div>
                    <label for="foto_perfil" class="foto-upload-label">📷 Escolher foto</label>
                    <input type="file" id="foto_perfil" name="foto_perfil"
                           accept="image/png, image/jpeg" style="display:none"
                           onchange="previewFoto(this)">
                    <p class="foto-nome-arquivo" id="nome-arquivo">Nenhum arquivo selecionado</p>
                    <button type="submit" class="btn-atualizar-foto" style="margin-top:8px;">Salvar foto</button>
                </div>
            </div>
        </form>
    </div>

    <!-- DADOS FÍSICOS (só para alunos) -->
    <div class="config-card" th:if="${usuario.tipo == 'aluno'}">
        <div class="config-card-header">
            <div class="config-card-icon">📊</div>
            <div>
                <h2>Dados Físicos</h2>
                <p>Informações para seu treinador acompanhar sua evolução</p>
            </div>
        </div>
        <form id="form-dados-fisicos">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
                <div class="form-group">
                    <label>Peso (kg)</label>
                    <input type="number" id="peso-input" name="peso" step="0.1"
                           placeholder="Ex: 75.5" th:value="${usuario.peso}">
                </div>
                <div class="form-group">
                    <label>Altura (cm)</label>
                    <input type="number" id="altura-input" name="alturaCm"
                           placeholder="Ex: 175" th:value="${usuario.alturaCm}">
                </div>
                <div class="form-group">
                    <label>Idade</label>
                    <input type="number" id="idade-input" name="idade"
                           placeholder="Ex: 25" th:value="${usuario.idade}">
                </div>
                <div class="form-group">
                    <label>Nível de Atividade</label>
                    <select id="nivel-input" name="nivelAtividade" style="
                        width:100%;padding:12px 16px;border:1.5px solid var(--borda);
                        border-radius:12px;background:var(--fundo-primario);
                        color:var(--texto-primario);font-size:0.92rem;
                        font-family:'Poppins',sans-serif;outline:none;cursor:pointer;">
                        <option value="">Selecionar...</option>
                        <option value="Sedentário" th:selected="${usuario.nivelAtividade == 'Sedentário'}">🪑 Sedentário</option>
                        <option value="Levemente ativo" th:selected="${usuario.nivelAtividade == 'Levemente ativo'}">🚶 Levemente ativo</option>
                        <option value="Moderadamente ativo" th:selected="${usuario.nivelAtividade == 'Moderadamente ativo'}">🏃 Moderadamente ativo</option>
                        <option value="Muito ativo" th:selected="${usuario.nivelAtividade == 'Muito ativo'}">⚡ Muito ativo</option>
                    </select>
                </div>
            </div>

            <div id="imc-display"
                 th:if="${usuario.peso != null and usuario.alturaCm != null}"
                 style="margin:16px 0;padding:14px 18px;background:var(--violeta-claro);
                        border-radius:12px;border:1px solid rgba(138,43,226,0.2);
                        display:flex;align-items:center;gap:12px;">
                <span style="font-size:1.4rem;">📏</span>
                <div>
                    <p style="font-size:0.78rem;color:var(--texto-secundario);margin:0;">Seu IMC atual</p>
                    <strong style="font-size:1.1rem;color:var(--violeta);" id="imc-valor"
                            th:text="${#numbers.formatDecimal(
                                usuario.peso / ((usuario.alturaCm / 100.0) * (usuario.alturaCm / 100.0)),
                                1, 1)}">
                    </strong>
                </div>
            </div>

            <button type="submit" class="btn-salvar">Salvar dados físicos</button>
        </form>
    </div>

    <!-- DADOS -->
    <div class="config-card">
        <div class="config-card-header">
            <div class="config-card-icon">👤</div>
            <div>
                <h2>Meus Dados</h2>
                <p>Atualize suas informações pessoais</p>
            </div>
        </div>
        <form id="form-config">
            <div class="form-group">
                <label for="nome">Nome completo</label>
                <input type="text" id="nome" name="nome" th:value="${usuario.nome}" required>
            </div>
            <button type="submit" class="btn-salvar">Salvar alterações</button>
        </form>
    </div>

    <!-- SEGURANÇA -->
    <div class="config-card">
        <div class="config-card-header">
            <div class="config-card-icon">🔒</div>
            <div>
                <h2>Segurança</h2>
                <p>Preencha apenas se quiser trocar a senha</p>
            </div>
        </div>
        <form id="form-senha">
            <div class="form-group">
                <label for="nova_senha">Nova senha</label>
                <div class="input-wrapper">
                    <input type="password" id="nova_senha" name="nova_senha" placeholder="Digite a nova senha">
                    <span class="toggle-eye" onclick="toggleSenha('nova_senha', this)">👁️</span>
                </div>
            </div>
            <div class="form-group">
                <label for="confirmar_senha">Confirmar nova senha</label>
                <div class="input-wrapper">
                    <input type="password" id="confirmar_senha" name="confirmar_senha" placeholder="Repita a nova senha">
                    <span class="toggle-eye" onclick="toggleSenha('confirmar_senha', this)">👁️</span>
                </div>
            </div>
            <button type="submit" class="btn-salvar">Atualizar senha</button>
        </form>
    </div>

</main>

<script th:src="@{/theme-toggle.js}"></script>
<script>
    const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute('content');
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');

    function previewFoto(input) {
        document.getElementById('nome-arquivo').textContent =
            input.files[0] ? input.files[0].name : 'Nenhum arquivo selecionado';
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const preview = document.getElementById('preview-foto');
                const placeholder = document.querySelector('.avatar-placeholder');
                if (preview) { preview.src = e.target.result; }
                else if (placeholder) {
                    const img = document.createElement('img');
                    img.src = e.target.result; img.id = 'preview-foto'; img.alt = 'Foto';
                    img.style.cssText = 'width:72px;height:72px;border-radius:50%;object-fit:cover;border:2px solid var(--violeta);flex-shrink:0;';
                    placeholder.replaceWith(img);
                }
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function toggleSenha(id, el) {
        const input = document.getElementById(id);
        if (input.type === 'password') { input.type = 'text'; el.textContent = '🙈'; }
        else { input.type = 'password'; el.textContent = '👁️'; }
    }

    function salvar(url, params) {
        const headers = { 'Content-Type': 'application/x-www-form-urlencoded' };
        headers[csrfHeader] = csrfToken;
        return fetch(url, { method: 'POST', headers, body: new URLSearchParams(params) })
            .then(r => r.json());
    }

    // Form dados físicos
    const formDadosFisicos = document.getElementById('form-dados-fisicos');
    if (formDadosFisicos) {
        function calcularIMC() {
            const peso = parseFloat(document.getElementById('peso-input').value);
            const altura = parseFloat(document.getElementById('altura-input').value);
            if (peso > 0 && altura > 0) {
                const alturaM = altura / 100;
                const imc = (peso / (alturaM * alturaM)).toFixed(1);
                let display = document.getElementById('imc-display');
                if (display) {
                    display.style.display = 'flex';
                    document.getElementById('imc-valor').textContent = imc;
                } else {
                    const div = document.createElement('div');
                    div.id = 'imc-display';
                    div.style.cssText = 'margin:16px 0;padding:14px 18px;background:var(--violeta-claro);border-radius:12px;border:1px solid rgba(138,43,226,0.2);display:flex;align-items:center;gap:12px;';
                    div.innerHTML = `<span style="font-size:1.4rem;">📏</span><div><p style="font-size:0.78rem;color:var(--texto-secundario);margin:0;">Seu IMC atual</p><strong id="imc-valor" style="font-size:1.1rem;color:var(--violeta);">${imc}</strong></div>`;
                    formDadosFisicos.querySelector('button[type="submit"]').before(div);
                }
            }
        }

        document.getElementById('peso-input').addEventListener('input', calcularIMC);
        document.getElementById('altura-input').addEventListener('input', calcularIMC);

        formDadosFisicos.addEventListener('submit', function(e) {
            e.preventDefault();
            const headers = { 'Content-Type': 'application/x-www-form-urlencoded' };
            headers[csrfHeader] = csrfToken;

            const params = new URLSearchParams({
                peso: document.getElementById('peso-input').value || '',
                alturaCm: document.getElementById('altura-input').value || '',
                idade: document.getElementById('idade-input').value || '',
                nivelAtividade: document.getElementById('nivel-input').value || ''
            });

            fetch('/api/atualizar-dados-fisicos', {
                method: 'POST',
                headers: headers,
                body: params
            })
                .then(r => r.json())
                .then(data => {
                    if (data.status === 'success') {
                        Swal.fire({ icon: 'success', title: 'Salvo!', text: data.message, confirmButtonColor: '#8A2BE2' })
                            .then(() => location.reload());
                    } else {
                        Swal.fire({ icon: 'error', title: 'Erro', text: data.message, confirmButtonColor: '#d33' });
                    }
                });
        });
    }

    // Form nome
    document.getElementById('form-config').addEventListener('submit', function(e) {
        e.preventDefault();
        salvar('/api/atualizar-perfil', { nome: document.getElementById('nome').value, nova_senha: '' })
            .then(data => {
                if (data.status === 'success') {
                    Swal.fire({ icon: 'success', title: 'Salvo!', text: data.message, confirmButtonColor: '#8A2BE2' })
                        .then(() => location.reload());
                } else {
                    Swal.fire({ icon: 'error', title: 'Erro', text: data.message, confirmButtonColor: '#d33' });
                }
            });
    });

    // Form senha
    document.getElementById('form-senha').addEventListener('submit', function(e) {
        e.preventDefault();
        const nova = document.getElementById('nova_senha').value;
        const confirmar = document.getElementById('confirmar_senha').value;
        if (nova !== confirmar) {
            Swal.fire({ icon: 'error', title: 'Atenção', text: 'As senhas não coincidem!', confirmButtonColor: '#8A2BE2' });
            return;
        }
        salvar('/api/atualizar-perfil', { nome: '', nova_senha: nova })
            .then(data => {
                if (data.status === 'success') {
                    Swal.fire({ icon: 'success', title: 'Senha atualizada!', text: data.message, confirmButtonColor: '#8A2BE2' })
                        .then(() => location.reload());
                } else {
                    Swal.fire({ icon: 'error', title: 'Erro', text: data.message, confirmButtonColor: '#d33' });
                }
            });
    });
</script>
</body>
</html>
