<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/login.css}">
    <title>Login</title>
</head>
<body>
<!-- Mensagem de erro no registro -->
<div th:if="${erro}" style="color:red; text-align:center; padding:10px;" th:text="${erro}"></div>

<!-- Mensagem de sucesso no registro -->
<div th:if="${sucesso}" style="color:green; text-align:center; padding:10px;" th:text="${sucesso}"></div>

<!-- Mensagem de erro de login -->
<div th:if="${param.erro}" style="color:red; text-align:center; padding:10px;">
    Email ou senha incorretos.
</div>

<!-- Mensagem de logout -->
<div th:if="${param.saiu}" style="color:green; text-align:center; padding:10px;">
    Você saiu com sucesso.
</div>

<div class="wrapper" id="wrapper">

    <!-- SIGN UP -->
    <div class="form-container sign-up">
        <form action="/registrar" method="POST">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <h2>Registre-se</h2>

            <div class="form-group">
                <input type="text" name="nome" id="reg-nome" required>
                <i class="fas fa-user"></i>
                <label for="reg-nome">Seu nome</label>
            </div>

            <div class="form-group">
                <input type="email" name="email" id="reg-email" required>
                <i class="fas fa-at"></i>
                <label for="reg-email">Email</label>
            </div>

            <div class="form-group">
                <input type="password" name="senha" id="reg-senha" required>
                <i class="fas fa-lock"></i>
                <label for="reg-senha">Senha</label>
            </div>

            <div class="user-type-buttons three-buttons" id="type-buttons-container">
                <button type="button" class="type-btn selected" data-tipo="aluno">Paciente</button>
                <button type="button" class="type-btn" data-tipo="nutricionista">Nutricionista</button>
                <button type="button" class="type-btn" data-tipo="treinador">Treinador</button>
            </div>

            <input type="hidden" name="tipo" id="reg-type" value="aluno">

            <button type="submit" class="btn">Registrar</button>

            <div class="link">
                <p>Você já tem uma conta? <a href="#" class="signin-link">Entrar</a></p>
            </div>
        </form>
    </div>

    <!-- LOGIN -->
    <div class="form-container sign-in">
        <form action="/login" method="POST">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <h2>Login</h2>

            <div class="form-group">
                <input type="email" name="username" id="login-email" required>
                <i class="fas fa-user"></i>
                <label for="login-email">Email</label>
            </div>

            <div class="form-group">
                <input type="password" name="password" id="login-senha" required>
                <i class="fas fa-lock"></i>
                <label for="login-senha">Senha</label>
            </div>

            <div class="forgot-pass">
                <a href="#">Esqueceu a senha?</a>
            </div>

            <button type="submit" class="btn">Entrar</button>

            <div class="link">
                <p>Não tem uma conta? <a href="#" class="signup-link">Registre-se</a></p>
            </div>
        </form>
    </div>

</div>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script th:src="@{/login.js}"></script>

<script>
    document.addEventListener('DOMContentLoaded', function() {

        // --- 1. ANIMAÇÃO TROCA LOGIN / REGISTRO ---
        const wrapper = document.querySelector('.wrapper');
        const signUpLink = document.querySelector('.signup-link');
        const signInLink = document.querySelector('.signin-link');

        if (signUpLink) {
            signUpLink.addEventListener('click', (e) => {
                e.preventDefault();
                wrapper.classList.add('animate-signIn');
                wrapper.classList.add('animate-signUp');
            });
        }

        if (signInLink) {
            signInLink.addEventListener('click', (e) => {
                e.preventDefault();
                wrapper.classList.add('animate-signIn');
                wrapper.classList.remove('animate-signUp');
            });
        }

        // --- 2. SELEÇÃO DO TIPO DE USUÁRIO ---
        const typeButtons = document.querySelectorAll('.type-btn');
        const hiddenTypeInput = document.getElementById('reg-type');

        typeButtons.forEach(btn => {
            btn.addEventListener('click', function() {
                typeButtons.forEach(b => b.classList.remove('selected'));
                this.classList.add('selected');
                hiddenTypeInput.value = this.getAttribute('data-tipo');
            });
        });

    });
</script>

</body>
</html>
