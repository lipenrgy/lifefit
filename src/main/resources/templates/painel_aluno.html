<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Painel — Life Fit</title>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <link rel="stylesheet" th:href="@{/painel.css}">
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <script>
        (function() {
            const t = localStorage.getItem('theme');
            if (t === 'dark') document.documentElement.classList.add('dark-mode');
            else if (window.matchMedia('(prefers-color-scheme: dark)').matches)
                document.documentElement.classList.add('dark-mode');
        })();
    </script>
</head>
<body>

<div th:replace="~{fragments/header :: header(${usuario})}"></div>

<main class="painel-container-aluno">

    <div class="plano-display">
        <h2>🏋️ Plano de Treino</h2>
        <p id="meu-treino" class="plano-conteudo">Carregando...</p>
    </div>

    <div class="plano-display">
        <h2>🥗 Plano de Dieta</h2>
        <p id="minha-dieta" class="plano-conteudo">Carregando...</p>
    </div>

</main>

<script th:src="@{/painel_aluno.js}"></script>
<script th:src="@{/theme-toggle.js}"></script>
</body>
</html>
