<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Painel - Life Fit</title>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <link rel="stylesheet" th:href="@{/painel.css}">
    <style>
        .painel-container-aluno {
            max-width: 900px;
            margin: 20px auto;
            padding: 20px;
        }
        .plano-display {
            background-color: var(--fundo-secundario);
            padding: 25px;
            border-radius: 8px;
            box-shadow: var(--sombra);
            margin-bottom: 30px;
            border: 1px solid var(--borda);
        }
        .plano-display h2 {
            color: var(--violeta);
            margin-top: 0;
            border-bottom: 2px solid var(--fundo-primario);
            padding-bottom: 10px;
        }
        .plano-conteudo {
            white-space: pre-wrap;
            line-height: 1.6;
            font-size: 1.1rem;
            color: var(--texto-secundario);
            min-height: 50px;
        }
    </style>
    <script>
        (function() {
            const theme = localStorage.getItem('theme');
            if (theme === 'dark') {
                document.documentElement.classList.add('dark-mode');
            } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.documentElement.classList.add('dark-mode');
            }
        })();
    </script>
</head>
<body>

<div th:replace="~{fragments/header :: header(${usuario})}"></div>

<main class="painel-container-aluno">

    <div class="plano-display">
        <h2>Meu Plano de Treino</h2>
        <p id="meu-treino" class="plano-conteudo">Carregando...</p>
    </div>

    <div class="plano-display">
        <h2>Minha Dieta</h2>
        <p id="minha-dieta" class="plano-conteudo">Carregando...</p>
    </div>

</main>

<!-- Modal foto de perfil -->
<div id="modal-foto" class="modal-overlay">
    <div class="modal-content">
        <span class="close-modal" onclick="fecharModalFoto()">&times;</span>
        <h3>Alterar Foto de Perfil</h3>
        <p style="font-size: 0.9em; color: #aaa;">Escolha uma imagem JPG ou PNG</p>
        <form th:action="@{/api/upload-foto}" method="POST" enctype="multipart/form-data">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="file" name="foto_perfil" id="foto_perfil" required accept="image/png, image/jpeg">
            <button type="submit" class="btn">Atualizar Foto</button>
        </form>
    </div>
</div>

<script th:src="@{/theme-toggle.js}"></script>
<script th:src="@{/painel_aluno.js}"></script>
</body>
</html>
