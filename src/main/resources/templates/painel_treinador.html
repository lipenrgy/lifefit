<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Profissional — Life Fit</title>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <link rel="stylesheet" th:href="@{/painel.css}">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        (function() {
            const t = localStorage.getItem('theme');
            if (t === 'dark') document.documentElement.classList.add('dark-mode');
            else if (window.matchMedia('(prefers-color-scheme: dark)').matches)
                document.documentElement.classList.add('dark-mode');
        })();
    </script>
</head>
<body>

<input type="hidden" id="tipo-usuario-logado" th:value="${usuario.tipo}">
<div th:replace="~{fragments/header :: header(${usuario})}"></div>

<main class="painel-container">

    <aside class="lista-alunos">
        <h2>👥 Meus Alunos</h2>
        <ul id="alunos-ul">
            <li style="color:var(--texto-secundario);padding:16px 20px;font-size:0.88rem;">
                Carregando...
            </li>
        </ul>
    </aside>

    <section class="area-plano">
        <h2 id="aluno-selecionado-nome">Selecione um aluno</h2>

        <form id="form-plano" class="hidden">
            <input type="hidden" id="aluno-id-hidden" name="aluno_id">

            <div th:if="${usuario.tipo == 'treinador'}">
                <label style="font-size:0.85rem;font-weight:600;color:var(--texto-secundario);display:block;margin-bottom:8px;">
                    Plano de Treino
                </label>
                <textarea id="treino" name="treino" placeholder="Descreva a rotina de exercícios..."></textarea>
            </div>

            <div th:if="${usuario.tipo == 'nutricionista'}">
                <label style="font-size:0.85rem;font-weight:600;color:var(--texto-secundario);display:block;margin-bottom:8px;">
                    Plano de Dieta
                </label>
                <textarea id="dieta" name="dieta" placeholder="Descreva o plano alimentar..."></textarea>
            </div>

            <button type="submit">💾 Salvar Plano</button>
        </form>
    </section>

</main>

<script th:src="@{/painel_treinador.js}"></script>
<script th:src="@{/theme-toggle.js}"></script>
</body>
</html>
