<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Profissional - Life Fit</title>
    <link rel="stylesheet" th:href="@{/painel.css}">
    <script>
        (function() {
            const theme = localStorage.getItem('theme');
            if (theme === 'dark') {
                document.documentElement.classList.add('dark-mode');
            } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.documentElement.classList.add('dark-mode');
            }
        })();
    </script>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body>

<input type="hidden" id="tipo-usuario-logado" th:value="${usuario.tipo}">

<div th:replace="~{fragments/header :: header(${usuario})}"></div>

<main class="painel-container">

    <section class="lista-alunos">
        <h2>Meus Alunos</h2>
        <ul id="alunos-ul"></ul>
    </section>

    <section class="area-plano">
        <h2 id="aluno-selecionado-nome">Selecione um aluno da lista</h2>
        <form id="form-plano" class="hidden">
            <input type="hidden" id="aluno-id-hidden" name="aluno_id">

            <div class="bloco-treino" th:if="${usuario.tipo == 'treinador'}">
                <label for="treino"><h3>Plano de Treino</h3></label>
                <textarea id="treino" name="treino" placeholder="Descreva a rotina de exercícios..."></textarea>
            </div>

            <div class="bloco-dieta" th:if="${usuario.tipo == 'nutricionista'}">
                <label for="dieta"><h3>Plano de Dieta</h3></label>
                <textarea id="dieta" name="dieta" placeholder="Descreva o plano alimentar..."></textarea>
            </div>

            <button type="submit">Salvar Plano</button>
        </form>
    </section>

</main>

<!-- Modal foto de perfil -->
<div id="modal-foto" class="modal-overlay">
    <div class="modal-content">
        <span class="close-modal" onclick="fecharModalFoto()">&times;</span>
        <h3>Alterar Foto de Perfil</h3>
        <form th:action="@{/api/upload-foto}" method="POST" enctype="multipart/form-data">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="file" name="foto_perfil" id="foto_perfil" required accept="image/png, image/jpeg">
            <button type="submit" class="btn">Atualizar Foto</button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/painel_treinador.js}"></script>
<script th:src="@{/theme-toggle.js}"></script>
</body>
</html>
